services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pixelwave
      POSTGRES_PASSWORD: pixelwave
      POSTGRES_DB: pixelwave
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pixelwave"]
      interval: 5s
      timeout: 5s
      retries: 10

  go-server:
    build: ./go-server
    ports:
      - "8080:8080"
    environment:
      PIXELWAVE_PORT: "8080"
      PIXELWAVE_REDIS_ADDR: "redis:6379"
      PIXELWAVE_POSTGRES_DSN: "postgres://pixelwave:pixelwave@postgres:5432/pixelwave?sslmode=disable"
      PIXELWAVE_CORS_ORIGIN: "*"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  react-frontend:
    build:
      context: ./frontend
      args:
        VITE_WS_URL: "ws://localhost:8080"
    ports:
      - "3000:3000"
    depends_on:
      - go-server

volumes:
  redis-data:
  postgres-data:
